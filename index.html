<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="選股雷達">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>每日潛力股雷達</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#c8ff00;--accent2:#00e5ff;--accent3:#ff6b35;
  --text:#f0f0f0;--muted:#6b6b80;--muted2:#9a9ab0;
  --green:#00e5a0;--red:#ff4d6d;--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  overflow-x:hidden;
  padding-top: var(--safe-top);
  padding-bottom: calc(60px + var(--safe-bot));
}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(200,255,0,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(200,255,0,0.018) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
 
/* ── layout ── */
.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px 24px;}
 
/* ── header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0 16px;border-bottom:1px solid var(--border2);margin-bottom:20px;
}
.logo-tag{font-family:var(--mono);font-size:21px;color:var(--accent);letter-spacing:.2em;margin-bottom:2px;}
.logo-title{font-size:30px;font-weight:700;line-height:1.1;}
.logo-title span{color:var(--accent);}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.date-badge{font-family:var(--mono);font-size:17px;background:var(--surface2);
  border:1px solid var(--border2);padding:4px 10px;border-radius:4px;color:var(--muted2);}
.last-update{font-size:19px;color:var(--muted);}
 
/* ── bottom nav bar (iOS style) ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  padding-bottom: var(--safe-bot);
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 0 8px;cursor:pointer;border:none;background:none;
  color:var(--muted);font-size:21px;font-family:var(--mono);letter-spacing:.05em;
  transition:color .2s;gap:4px;
}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:23px;line-height:1;}
 
/* ── market tabs ── */
.market-tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab{
  font-family:var(--mono);font-size:17px;letter-spacing:.06em;
  padding:8px 16px;border:1px solid var(--border2);background:none;
  color:var(--muted2);cursor:pointer;border-radius:6px;transition:all .2s;
  flex:1;text-align:center;
}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.tab.us.active{background:var(--accent2);border-color:var(--accent2);color:#000;}
 
/* ── price filter tabs ── */
.price-filters{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.pf-btn{
  font-family:var(--mono);font-size:13px;padding:7px 14px;
  border:1px solid var(--border2);background:none;color:var(--muted2);
  cursor:pointer;border-radius:20px;transition:all .2s;flex:1;text-align:center;
  white-space:nowrap;
}
.pf-btn:active{transform:scale(.97);}
.pf-btn.pf-active{font-weight:700;color:#000;}
.pf-btn.pf-all.pf-active{background:var(--muted2);border-color:var(--muted2);}
 
/* ── tier ── */
.tier-section{margin-bottom:28px;}
.tier-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
.tier-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tier-label{font-family:var(--mono);font-size:21px;letter-spacing:.15em;color:var(--muted);}
.tier-name{font-size:19px;font-weight:500;}
.tier-count{margin-left:auto;font-family:var(--mono);font-size:21px;color:var(--muted);}
 
/* ── cards (single column on mobile) ── */
.cards{display:flex;flex-direction:column;gap:10px;}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:16px;cursor:pointer;transition:border-color .2s;
  position:relative;overflow:hidden;animation:fadeUp .25s ease both;
}
.card:active{background:var(--surface2);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.rank-1::before{background:var(--gold);}
.card.rank-2::before{background:var(--silver);}
.card.rank-3::before{background:var(--bronze);}
 
/* streak */
.streak-badge{
  position:absolute;top:10px;right:10px;font-family:var(--mono);
  font-size:21px;padding:2px 7px;border-radius:3px;font-weight:700;
}
.streak-new{background:rgba(0,229,160,.12);border:1px solid rgba(0,229,160,.3);color:var(--green);}
.streak-2{background:rgba(0,180,255,.12);border:1px solid rgba(0,180,255,.3);color:var(--accent2);}
.streak-3{background:rgba(200,255,0,.12);border:1px solid rgba(200,255,0,.3);color:var(--accent);}
.streak-4plus{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);color:var(--accent3);}
 
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.rank-badge{
  font-family:var(--mono);font-size:21px;padding:2px 7px;border-radius:3px;
  background:var(--surface2);color:var(--muted);margin-bottom:5px;display:inline-block;
}
.card.rank-1 .rank-badge{color:var(--gold);}
.card.rank-2 .rank-badge{color:var(--silver);}
.card.rank-3 .rank-badge{color:var(--bronze);}
.stock-name{font-size:19px;font-weight:700;margin-bottom:1px;}
.stock-code{font-family:var(--mono);font-size:21px;color:var(--muted);letter-spacing:.04em;}
 
.score-ring{display:flex;align-items:center;justify-content:center;width:52px;height:52px;position:relative;flex-shrink:0;}
.score-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.score-num{font-family:var(--mono);font-size:21px;font-weight:700;position:relative;z-index:1;}
 
.price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
.price-main{font-family:var(--mono);font-size:30px;font-weight:700;}
.price-change{font-family:var(--mono);font-size:17px;padding:2px 6px;border-radius:3px;}
.price-change.up{background:rgba(0,229,160,.12);color:var(--green);}
.price-change.dn{background:rgba(255,77,109,.12);color:var(--red);}
 
.signals{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.sig{font-size:21px;font-family:var(--mono);padding:2px 6px;border-radius:3px;border:1px solid;}
.sig.on{background:rgba(200,255,0,.07);border-color:rgba(200,255,0,.28);color:var(--accent);}
.sig.off{background:transparent;border-color:var(--border);color:var(--muted);}
 
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.stat{background:var(--surface2);border-radius:5px;padding:7px 8px;}
.stat-label{font-size:21px;color:var(--muted);margin-bottom:2px;font-family:var(--mono);}
.stat-val{font-size:21px;font-weight:500;font-family:var(--mono);}
.stat-val.pos{color:var(--green);}
.stat-val.neg{color:var(--red);}
 
.expand-btn{
  width:100%;font-size:19px;color:var(--muted);background:none;
  border:1px solid var(--border);border-radius:5px;padding:7px;cursor:pointer;
  font-family:var(--mono);letter-spacing:.05em;display:flex;
  align-items:center;justify-content:center;gap:5px;
}
.expand-icon{transition:transform .25s;}
.card.expanded .expand-icon{transform:rotate(180deg);}
.detail-section{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.card.expanded .detail-section{max-height:800px;}
.detail-inner{padding-top:12px;border-top:1px solid var(--border);margin-top:12px;}
.detail-block{margin-bottom:10px;}
.detail-title{font-family:var(--mono);font-size:21px;color:var(--muted);letter-spacing:.12em;margin-bottom:4px;}
.detail-text{font-size:21px;line-height:1.7;color:var(--muted2);}
.detail-text li{padding-left:10px;position:relative;list-style:none;margin-bottom:2px;}
.detail-text li::before{content:'›';position:absolute;left:0;color:var(--accent);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:19px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);color:var(--muted2);}
.chip.buy{border-color:rgba(0,229,160,.3);color:var(--green);background:rgba(0,229,160,.07);}
.chip.sell{border-color:rgba(255,77,109,.3);color:var(--red);background:rgba(255,77,109,.07);}
.entry-range{font-family:var(--mono);font-size:17px;color:var(--accent);font-weight:700;}
.risk-tag{font-size:19px;padding:3px 7px;border-radius:3px;background:rgba(255,107,53,.1);
  border:1px solid rgba(255,107,53,.3);color:var(--accent3);display:inline-block;margin:3px 3px 0 0;}
 
/* ── sector analysis ── */
.sector-block{background:var(--surface2);border-radius:7px;padding:12px;margin-bottom:10px;}
.sector-block-title{font-family:var(--mono);font-size:21px;color:var(--muted);letter-spacing:.12em;margin-bottom:10px;}
.flow-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.flow-label{font-size:17px;color:var(--muted2);width:70px;flex-shrink:0;}
.flow-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.flow-bar{height:100%;border-radius:3px;transition:width .6s ease;}
.flow-bar.in{background:var(--green);}
.flow-bar.out{background:var(--red);}
.flow-val{font-family:var(--mono);font-size:19px;width:44px;text-align:right;flex-shrink:0;}
.flow-val.pos{color:var(--green);}
.flow-val.neg{color:var(--red);}
.cycle-row{display:flex;gap:6px;flex-wrap:wrap;}
.cycle-tag{font-size:19px;padding:4px 9px;border-radius:4px;font-family:var(--mono);}
.cycle-tag.stage-boom{background:rgba(200,255,0,.1);border:1px solid rgba(200,255,0,.3);color:var(--accent);}
.cycle-tag.stage-recovery{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--green);}
.cycle-tag.stage-slowdown{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);color:var(--accent3);}
.cycle-tag.stage-downturn{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:var(--red);}
.cycle-tag.stage-neutral{background:var(--border);border:1px solid var(--border2);color:var(--muted2);}
.cycle-progress{margin-top:10px;}
.cycle-track{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:2px;}
.cycle-seg{flex:1;border-radius:2px;}
.cycle-seg.active{opacity:1;}
.cycle-seg.inactive{opacity:.2;}
.cycle-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;}
.cycle-legend-item{display:flex;align-items:center;gap:4px;font-size:21px;color:var(--muted);font-family:var(--mono);}
.cycle-dot{width:6px;height:6px;border-radius:50%;}
.sector-summary{font-size:17px;color:var(--muted2);line-height:1.6;margin-top:8px;}
 
/* ── search ── */
#page-search{display:none;}
.search-wrap{position:relative;margin-bottom:16px;}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:14px 44px 14px 16px;
  font-size:16px;color:var(--text);font-family:var(--sans);
  outline:none;transition:border-color .2s;
}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.search-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;display:none;
}
.search-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.sf-btn{
  font-family:var(--mono);font-size:12px;padding:6px 14px;
  border:1px solid var(--border2);background:none;color:var(--muted2);
  cursor:pointer;border-radius:20px;transition:all .2s;
}
.sf-btn.sf-active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.search-results{display:flex;flex-direction:column;gap:10px;}
.search-empty{text-align:center;padding:48px 20px;color:var(--muted);}
.search-empty-icon{font-size:32px;margin-bottom:10px;opacity:.4;}
.search-empty p{font-size:14px;line-height:1.7;}
.search-count{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;}
.analyze-btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  background:var(--accent);color:#000;font-size:16px;font-weight:700;
  font-family:var(--sans);cursor:pointer;margin-bottom:18px;
  transition:opacity .2s;
}
.analyze-btn:active{opacity:.8;}
.analyze-btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.ai-result-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:18px;margin-bottom:12px;
}
.ai-result-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px;
}
.ai-stock-info{}
.ai-stock-name{font-size:20px;font-weight:700;margin-bottom:2px;}
.ai-stock-code{font-family:var(--mono);font-size:12px;color:var(--muted);}
.ai-price-wrap{text-align:right;}
.ai-price{font-family:var(--mono);font-size:24px;font-weight:700;}
.ai-chg{font-family:var(--mono);font-size:12px;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block;}
.ai-section{margin-bottom:14px;}
.ai-section-title{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:.12em;margin-bottom:8px;
}
.ai-analysis-text{
  font-size:14px;line-height:1.75;color:var(--muted2);
  white-space:pre-wrap;
}
.ai-score-row{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px;
}
.ai-score-label{font-size:13px;color:var(--muted2);}
.ai-score-val{
  font-family:var(--mono);font-size:26px;font-weight:700;
  margin-left:auto;
}
.ai-quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.ai-stat{background:var(--surface2);border-radius:6px;padding:8px 10px;}
.ai-stat-label{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:var(--mono);}
.ai-stat-val{font-size:13px;font-weight:500;font-family:var(--mono);}
.ai-stat-val.pos{color:var(--green);}
.ai-stat-val.neg{color:var(--red);}
.ai-signals{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.ai-entry{
  font-family:var(--mono);font-size:16px;color:var(--accent);
  font-weight:700;background:var(--surface2);border-radius:6px;
  padding:10px 14px;margin-bottom:14px;
}
.ai-risks{display:flex;flex-wrap:wrap;gap:6px;}
.loading-spinner{
  display:flex;flex-direction:column;align-items:center;
  padding:48px 20px;gap:16px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.1em;}
.error-card{
  background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);
  border-radius:10px;padding:16px;text-align:center;
}
.error-card p{font-size:13px;color:var(--red);line-height:1.7;}
.s-card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;
}
.s-card:active{background:var(--surface2);}
.s-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.s-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.s-card-left{display:flex;align-items:center;gap:10px;}
.s-market-tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid;flex-shrink:0;}
.s-market-tag.tw{border-color:rgba(200,255,0,.3);color:var(--accent);background:rgba(200,255,0,.07);}
.s-market-tag.us{border-color:rgba(0,229,255,.3);color:var(--accent2);background:rgba(0,229,255,.07);}
.s-name{font-size:16px;font-weight:700;}
.s-code{font-family:var(--mono);font-size:11px;color:var(--muted);}
.s-sector{font-size:11px;color:var(--muted2);margin-top:2px;}
.s-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.s-stat{background:var(--surface2);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:11px;}
.s-stat span{color:var(--muted);margin-right:4px;}
.s-price{font-family:var(--mono);font-size:18px;font-weight:700;}
.s-chg{font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;}
.s-chg.up{background:rgba(0,229,160,.12);color:var(--green);}
.s-chg.dn{background:rgba(255,77,109,.12);color:var(--red);}
.s-score{font-family:var(--mono);font-size:12px;color:var(--muted2);}
.highlight{color:var(--accent);font-weight:700;}
 
/* ── history ── */
#page-history{display:none;}
.hist-controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.hist-select{
  font-family:var(--mono);font-size:17px;background:var(--surface);
  border:1px solid var(--border2);color:var(--muted2);padding:7px 10px;border-radius:5px;flex:1;
}
.hist-clear{
  font-family:var(--mono);font-size:19px;background:none;
  border:1px solid rgba(255,77,109,.3);color:var(--red);padding:7px 12px;
  border-radius:5px;cursor:pointer;white-space:nowrap;
}
.hist-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.hist-stat{background:var(--surface2);border-radius:6px;padding:10px 12px;}
.hist-stat-label{font-size:21px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;margin-bottom:4px;}
.hist-stat-val{font-size:21px;font-weight:700;font-family:var(--mono);}
.hist-stat-val.accent{color:var(--accent);}
.hist-stat-val.info{color:var(--accent2);}
.hist-stat-val.warn{color:var(--accent3);}
.leaderboard{display:flex;flex-direction:column;gap:8px;}
.lb-item{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;display:flex;align-items:center;gap:12px;
}
.lb-rank{font-family:var(--mono);font-size:17px;color:var(--muted);width:24px;text-align:center;}
.lb-info{flex:1;min-width:0;}
.lb-name{font-size:19px;font-weight:500;margin-bottom:1px;}
.lb-code{font-family:var(--mono);font-size:21px;color:var(--muted);}
.lb-streak-bar{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.lb-day{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;}
.lb-day.on{background:rgba(200,255,0,.15);border:1px solid rgba(200,255,0,.3);color:var(--accent);}
.lb-day.off{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.lb-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.lb-streak-count{font-family:var(--mono);font-size:23px;font-weight:700;}
.lb-streak-label{font-size:21px;color:var(--muted);}
.lb-best-score{font-family:var(--mono);font-size:19px;color:var(--muted2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px;}
.cal-cell{
  aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:21px;border:1px solid var(--border);
}
.cal-cell.has-data{background:rgba(200,255,0,.08);border-color:rgba(200,255,0,.2);color:var(--accent);}
.empty-hist{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-hist-icon{font-size:28px;margin-bottom:10px;opacity:.4;}
.empty-hist p{font-size:21px;line-height:1.7;}
 
/* ── install banner ── */
.install-banner{
  background:linear-gradient(135deg,rgba(200,255,0,0.08),rgba(0,229,255,0.08));
  border:1px solid rgba(200,255,0,0.25);border-radius:10px;
  padding:16px;margin-bottom:20px;display:none;
  animation:fadeUp .4s ease;
}
.install-banner h3{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--accent);}
.install-banner p{font-size:21px;color:var(--muted2);line-height:1.6;margin-bottom:12px;}
.install-steps{display:flex;flex-direction:column;gap:8px;}
.install-step{display:flex;align-items:center;gap:10px;font-size:21px;color:var(--muted2);}
.install-step-num{
  width:24px;height:24px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border2);font-family:var(--mono);font-size:19px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);
}
.install-dismiss{
  font-family:var(--mono);font-size:19px;background:none;
  border:1px solid var(--border2);color:var(--muted);padding:6px 14px;
  border-radius:4px;cursor:pointer;margin-top:10px;width:100%;
}
 
/* ── update toast ── */
.toast{
  position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
  padding:10px 18px;font-size:21px;font-family:var(--mono);color:var(--accent2);
  z-index:200;transition:transform .3s ease;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.toast.show{transform:translateX(-50%) translateY(0);}
 
/* ── misc ── */
.disclaimer{font-size:19px;color:var(--muted);border-top:1px solid var(--border);padding-top:14px;margin-top:14px;line-height:1.6;}
.loading-bar{width:100%;height:2px;background:var(--surface2);margin-bottom:20px;border-radius:1px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);animation:loading 1.6s ease forwards;}
.loading-text{font-family:var(--mono);font-size:19px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px;}
@keyframes loading{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.09s}.card:nth-child(4){animation-delay:.12s}
.card:nth-child(5){animation-delay:.15s}
</style>

const KEY = 'stock_radar_v2';
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)||'{}'); }catch(e){ return {}; } }
function save(h){ localStorage.setItem(KEY, JSON.stringify(h)); }
function todayStr(){
  return new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:'Asia/Taipei'}).replace(/\//g,'-');
}
function recordToday(){
  const h=load(), d=todayStr();
  ['tw','us'].forEach(m=>{
    if(!h[m])h[m]={};
    if(!h[m][d])h[m][d]=[];
    const exist=h[m][d].map(x=>x.code);
    TODAY[m].forEach(s=>{ if(!exist.includes(s.code)) h[m][d].push({code:s.code,name:s.name,score:s.score,rank:s.rank,price:s.price,sector:s.sector}); });
  });
  save(h);
}
function streak(entries, code){
  const dates=Object.keys(entries).sort().reverse();
  let n=0; for(const d of dates){ if((entries[d]||[]).some(x=>x.code===code))n++; else break; }
  return n;
}

function scoreRing(v){
  const c=v>=8.5?'#c8ff00':v>=7?'#00e5ff':'#888';
  const r=23,ci=2*Math.PI*r,f=(v/10)*ci;
  return `<div class="score-ring"><svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3"/><circle cx="26" cy="26" r="${r}" fill="none" stroke="${c}" stroke-width="3" stroke-dasharray="${f.toFixed(1)} ${ci.toFixed(1)}" stroke-linecap="round"/></svg><span class="score-num" style="color:${c}">${v.toFixed(1)}</span></div>`;
}
function sigs(d){
  return [['多頭',d.ma_align===3],['MACD',d.macd],['放量',d.vol_ratio>=1.5],['突破',d.breakout]]
    .map(([l,on])=>`<span class="sig ${on?'on':'off'}">${l}</span>`).join('');
}
function streakBadge(n){
  if(n<=1) return `<span class="streak-badge streak-new">NEW</span>`;
  if(n===2) return `<span class="streak-badge streak-2">連莊2天</span>`;
  if(n===3) return `<span class="streak-badge streak-3">連莊3天</span>`;
  return `<span class="streak-badge streak-4plus">連莊${n}天🔥</span>`;
}

function renderSectorAnalysis(sectorName){
  const sd = getSectorData(sectorName);
  if(!sd) return '';
 
  // flow bars
  const maxFlow = Math.max(...sd.flows.map(f=>f.pct));
  const flowsHtml = sd.flows.map(f=>`
    <div class="flow-row">
      <div class="flow-label">${f.label}</div>
      <div class="flow-bar-wrap">
        <div class="flow-bar ${f.dir==='in'?'in':'out'}"
          style="width:${Math.round(f.pct/maxFlow*100)}%"></div>
      </div>
      <div class="flow-val ${f.dir==='in'?'pos':'neg'}">${f.val}</div>
    </div>`).join('');
 
  // cycle stage
  const stages=[
    {key:'recovery',name:'復甦',color:'#00e5a0'},
    {key:'boom',    name:'高峰',color:'#c8ff00'},
    {key:'slowdown',name:'趨緩',color:'#ff6b35'},
    {key:'downturn',name:'衰退',color:'#ff4d6d'},
  ];
  const pos = sd.cycle_pos ?? 1; // 0=復甦 1=高峰 2=趨緩 3=衰退
  const segsHtml = stages.map((s,i)=>`
    <div class="cycle-seg ${i===pos?'active':'inactive'}"
      style="background:${s.color}"></div>`).join('');
  const legendHtml = stages.map((s,i)=>`
    <div class="cycle-legend-item">
      <div class="cycle-dot ${i===pos?'':''}}" style="background:${s.color};opacity:${i===pos?1:0.3}"></div>
      <span style="opacity:${i===pos?1:0.5};color:${i===pos?s.color:'var(--muted)'}">${s.name}</span>
    </div>`).join('');
 
  return `
  <div class="sector-block">
    <div class="sector-block-title">// 產業資金流向｜${sectorName}</div>
    ${flowsHtml}
    <div class="sector-summary">${sd.summary}</div>
  </div>
  <div class="sector-block">
    <div class="sector-block-title">// 景氣週期位置</div>
    <div class="cycle-row">
      <span class="cycle-tag stage-${sd.stage}">${sd.stageName}</span>
    </div>
    <div class="cycle-progress">
      <div class="cycle-track">${segsHtml}</div>
      <div class="cycle-legend">${legendHtml}</div>
    </div>
    <div class="sector-summary" style="margin-top:8px">
      📌 ${sd.outlook}
    </div>
  </div>`;
}

let activeFilter='all';
 
function updateFilterBtns(market){
  const tiers=TIERS[market];
  const labels={tw:['50元以下','50~99元','100元以上'],us:['$50以下','$50~$199','$200以上']};
  const colors=tiers.map(t=>t.color);
  ['low','mid','high'].forEach((k,i)=>{
    const btn=document.getElementById('pf-'+k);
    if(!btn) return;
    btn.textContent=labels[market][i];
    btn.style.setProperty('--pf-color', colors[2-i]);
    if(btn.classList.contains('pf-active')){
      btn.style.background=colors[2-i];
      btn.style.borderColor=colors[2-i];
    }
  });
}
 
function setFilter(filter, btn){
  activeFilter=filter;
  const tiers=TIERS[mkt];
  const colors=tiers.map(t=>t.color);
  document.querySelectorAll('.pf-btn').forEach(b=>{
    b.classList.remove('pf-active');
    b.style.background='';
    b.style.borderColor='';
    b.style.color='';
  });
  btn.classList.add('pf-active');
  if(filter==='all'){
    btn.style.background='var(--muted2)';
    btn.style.borderColor='var(--muted2)';
    btn.style.color='#000';
  } else {
    const colorMap={low:colors[2],mid:colors[1],high:colors[0]};
    btn.style.background=colorMap[filter];
    btn.style.borderColor=colorMap[filter];
    btn.style.color='#000';
  }
  document.getElementById('content').innerHTML=renderMarket(mkt);
}
 
function renderMarket(market){
  const h=load(), stocks=TODAY[market], tiers=TIERS[market];
  let html='';
  const filterMap={low:tiers[2],mid:tiers[1],high:tiers[0],all:null};
  const activeTiers = activeFilter==='all' ? tiers : [filterMap[activeFilter]];
  activeTiers.forEach(t=>{
    if(!t) return;
    const ts=stocks.filter(s=>s.price>=t.min&&s.price<t.max).slice(0,5);
    if(!ts.length) return;
    html+=`<div class="tier-section"><div class="tier-header"><div class="tier-dot" style="background:${t.color}"></div><div class="tier-label">TIER</div><div class="tier-name">${t.label}</div><div class="tier-count">TOP ${ts.length}</div></div><div class="cards">${ts.map(s=>card(s,t.color,h)).join('')}</div></div>`;
  });
  if(!html) html=`<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:16px;">此區間今日無符合股票</div>`;
  html+=`<div class="disclaimer">⚠️ AI 輔助分析，僅供參考，不構成投資建議。股市有風險，請謹慎操作。</div>`;
  return html;
}
 
function toggleCard(c){
  const was=c.classList.contains('expanded');
  document.querySelectorAll('.card.expanded').forEach(x=>x.classList.remove('expanded'));
  if(!was) c.classList.add('expanded');
}
function switchMarket(market, btn){
  mkt=market;
  activeFilter='all';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pf-btn').forEach(b=>{
    b.classList.remove('pf-active');
    b.style.background='';
    b.style.borderColor='';
    b.style.color='';
  });
  const allBtn=document.querySelector('.pf-all');
  if(allBtn){
    allBtn.classList.add('pf-active');
    allBtn.style.background='var(--muted2)';
    allBtn.style.borderColor='var(--muted2)';
    allBtn.style.color='#000';
  }
  updateFilterBtns(market);
  document.getElementById('content').innerHTML=renderMarket(market);
}

      .map(d=>{ const on=(entries[d]||[]).some(x=>x.code===s.code); return `<div class="lb-day ${on?'on':'off'}">${on?'▪':'·'}</div>`; }).join('');
    return `<div class="lb-item">

        <div class="lb-streak-label">天上榜</div>
        <div class="lb-best-score">最高 ${Math.max(...s.scores).toFixed(1)}</div>
      </div>
    </div>`;
  }).join('');

// 用 Yahoo Finance API 抓即時股票資料
async function fetchStockData(ticker){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`;
  const quoteUrl = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=summaryDetail,defaultKeyStatistics,financialData,price`;
 
  const [chartRes, quoteRes] = await Promise.all([
    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`),
    fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(quoteUrl)}`)
  ]);
 
  const chartData = await chartRes.json();
  const quoteData = await quoteRes.json();
 
  const meta = chartData?.chart?.result?.[0]?.meta;
  const summary = quoteData?.quoteSummary?.result;
 
  if(!meta) throw new Error('找不到股票資料，請確認代號是否正確');
 
  const price = meta.regularMarketPrice;
  const prevClose = meta.previousClose || meta.chartPreviousClose;
  const chg = prevClose ? +((price - prevClose) / prevClose * 100).toFixed(2) : 0;
 
  // 從 summary 抓基本面
  const sd = summary?.[0]?.summaryDetail || {};
  const ks = summary?.[0]?.defaultKeyStatistics || {};
  const fd = summary?.[0]?.financialData || {};
  const pd = summary?.[0]?.price || {};
 
  const closes = chartData?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(Boolean) || [];
  const volumes = chartData?.chart?.result?.[0]?.indicators?.quote?.[0]?.volume?.filter(Boolean) || [];
 
  // 計算技術指標
  let rsi = null, ma5 = null, ma20 = null, macd_cross = false, vol_ratio = null;
 
  if(closes.length >= 20){
    const last = closes.slice(-20);
    ma5  = (closes.slice(-5).reduce((a,b)=>a+b,0)/5).toFixed(2);
    ma20 = (last.reduce((a,b)=>a+b,0)/20).toFixed(2);
 
    // RSI
    const diffs = closes.slice(-15).map((v,i,a)=>i>0?v-a[i-1]:0).slice(1);
    const gains = diffs.map(d=>d>0?d:0);
    const losses = diffs.map(d=>d<0?-d:0);
    const avgG = gains.reduce((a,b)=>a+b,0)/gains.length;
    const avgL = losses.reduce((a,b)=>a+b,0)/losses.length;
    rsi = avgL===0 ? 100 : +(100 - 100/(1+avgG/avgL)).toFixed(1);
 
    // Volume ratio
    const vols = volumes.slice(-6);
    if(vols.length >= 6){
      const todayVol = vols[vols.length-1];
      const avg5 = vols.slice(0,-1).reduce((a,b)=>a+b,0)/5;
      vol_ratio = avg5>0 ? +(todayVol/avg5).toFixed(2) : null;
    }
 
    // MACD (簡化)
    const ema12 = closes.slice(-13).reduce((a,b,i)=>i===0?b:a*11/13+b*2/13, closes.slice(-13)[0]);
    const ema26 = closes.slice(-27).reduce((a,b,i)=>i===0?b:a*25/27+b*2/27, closes.slice(-27)[0]);
    const prevEma12 = closes.slice(-14,-1).reduce((a,b,i)=>i===0?b:a*11/13+b*2/13, closes.slice(-14,-1)[0]);
    const prevEma26 = closes.slice(-28,-1).reduce((a,b,i)=>i===0?b:a*25/27+b*2/27, closes.slice(-28,-1)[0]);
    macd_cross = (ema12-ema26) > (prevEma12-prevEma26);
  }
 
  const ma_align = [price>parseFloat(ma5), price>parseFloat(ma20)].filter(Boolean).length;
  const recent_high = Math.max(...closes.slice(-20,-1));
  const breakout = price > recent_high;
 
  return {
    name: pd.shortName || pd.longName || meta.symbol,
    code: meta.symbol,
    price: +price.toFixed(2),
    chg,
    currency: meta.currency || 'TWD',
    exchange: meta.exchangeName || '',
    rsi, ma5: +ma5, ma20: +ma20,
    macd_cross, vol_ratio,
    ma_align, breakout,
    pe:   sd.trailingPE?.raw?.toFixed(1) || ks.forwardPE?.raw?.toFixed(1) || null,
    pb:   ks.priceToBook?.raw?.toFixed(2) || null,
    roe:  fd.returnOnEquity?.raw ? (fd.returnOnEquity.raw*100).toFixed(1) : null,
    rev_growth: fd.revenueGrowth?.raw ? (fd.revenueGrowth.raw*100).toFixed(1) : null,
    gross_margin: fd.grossMargins?.raw ? (fd.grossMargins.raw*100).toFixed(1) : null,
    div_yield: sd.dividendYield?.raw ? (sd.dividendYield.raw*100).toFixed(2) : null,
    market_cap: pd.marketCap?.fmt || null,
    analyst_target: fd.targetMeanPrice?.raw?.toFixed(2) || null,
    week52_high: sd.fiftyTwoWeekHigh?.raw?.toFixed(2) || null,
    week52_low:  sd.fiftyTwoWeekLow?.raw?.toFixed(2)  || null,
  };
}
 
// 呼叫 Claude AI 分析
async function analyzeWithClaude(stock, market){
  const isTW = market === 'tw';
  const sym = isTW ? '' : '$';
  const prompt = `你是一位專業的${isTW?'台股':'美股'}分析師，請根據以下即時資料對這檔股票做完整分析。
 
股票：${stock.name}（${stock.code}）
現價：${sym}${stock.price}　今日漲跌：${stock.chg>0?'+':''}${stock.chg}%
MA5：${stock.ma5}　MA20：${stock.ma20}　均線多頭：${stock.ma_align}/2
RSI（14日）：${stock.rsi}　MACD趨勢：${stock.macd_cross?'金叉偏多':'偏空或中性'}
量比（今日/5日均量）：${stock.vol_ratio}x　突破近20日高點：${stock.breakout?'是':'否'}
本益比：${stock.pe??'N/A'}　ROE：${stock.roe??'N/A'}%　${isTW?`殖利率：${stock.div_yield??'N/A'}%`:`毛利率：${stock.gross_margin??'N/A'}%`}
營收成長：${stock.rev_growth??'N/A'}%　市值：${stock.market_cap??'N/A'}
52週高點：${sym}${stock.week52_high}　52週低點：${sym}${stock.week52_low}
${stock.analyst_target?`分析師平均目標價：${sym}${stock.analyst_target}`:''}
 
請用以下格式回覆（繁體中文，語氣專業易懂）：
 
【AI 評分】X.X / 10
 
【技術面分析】
（3點，引用實際數字，說明趨勢方向、動能強弱、是否適合進場）
 
【基本面分析】
（2-3點，說明估值、獲利品質、成長性）
 
【進場參考區間】
${sym}XXX ~ ${sym}XXX
 
【主要風險】
（2點）
 
【操作建議】
（1-2句，說明短中期策略）`;
 
  const resp = await fetch(WORKER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
 
  if(!resp.ok){
    const err = await resp.json();
    throw new Error(err.error?.message || 'AI 分析失敗');
  }
 
  const data = await resp.json();
  return data.content[0].text;
}
 
// 解析 Claude 回應並渲染卡片
function parseAndRender(stock, aiText, market){
  const isTW = market==='tw';
  const sym = isTW?'':'$';
  const chgCls = stock.chg>=0?'up':'dn';
 
  // 從 AI 回應提取評分
  const scoreMatch = aiText.match(/【AI 評分】\s*([\d.]+)/);
  const score = scoreMatch ? parseFloat(scoreMatch[1]) : null;
  const scoreColor = score>=8.5?'#c8ff00':score>=7?'#00e5ff':'#9a9ab0';
 
  // 進場區間
  const entryMatch = aiText.match(/【進場參考區間】\s*
([^
【]+)/);
  const entry = entryMatch ? entryMatch[1].trim() : '—';
 
  // 技術訊號
  const sigHtml = [
    ['均線多頭', stock.ma_align>=2],
    ['MACD偏多', stock.macd_cross],
    ['量能放大', stock.vol_ratio>=1.5],
    ['突破近高', stock.breakout],
    ['RSI健康', stock.rsi>=45&&stock.rsi<=75],
  ].map(([l,on])=>`<span class="sig ${on?'on':'off'}" style="font-size:12px">${l}</span>`).join('');
 
  // 52週位置
  const w52pct = stock.week52_high && stock.week52_low
    ? Math.round((stock.price-stock.week52_low)/(stock.week52_high-stock.week52_low)*100)
    : null;
 
  const statsHtml = isTW ? `
    <div class="ai-stat"><div class="ai-stat-label">RSI</div><div class="ai-stat-val">${stock.rsi??'—'}</div></div>
    <div class="ai-stat"><div class="ai-stat-label">本益比</div><div class="ai-stat-val">${stock.pe??'—'}</div></div>
    <div class="ai-stat"><div class="ai-stat-label">ROE</div><div class="ai-stat-val pos">${stock.roe??'—'}%</div></div>
    <div class="ai-stat"><div class="ai-stat-label">量比</div><div class="ai-stat-val">${stock.vol_ratio??'—'}x</div></div>
    <div class="ai-stat"><div class="ai-stat-label">殖利率</div><div class="ai-stat-val">${stock.div_yield??'—'}%</div></div>
    <div class="ai-stat"><div class="ai-stat-label">52週位置</div><div class="ai-stat-val">${w52pct??'—'}%</div></div>
  ` : `
    <div class="ai-stat"><div class="ai-stat-label">RSI</div><div class="ai-stat-val">${stock.rsi??'—'}</div></div>
    <div class="ai-stat"><div class="ai-stat-label">本益比</div><div class="ai-stat-val">${stock.pe??'—'}</div></div>
    <div class="ai-stat"><div class="ai-stat-label">毛利率</div><div class="ai-stat-val pos">${stock.gross_margin??'—'}%</div></div>
    <div class="ai-stat"><div class="ai-stat-label">量比</div><div class="ai-stat-val">${stock.vol_ratio??'—'}x</div></div>
    <div class="ai-stat"><div class="ai-stat-label">目標價</div><div class="ai-stat-val">$${stock.analyst_target??'—'}</div></div>
    <div class="ai-stat"><div class="ai-stat-label">52週位置</div><div class="ai-stat-val">${w52pct??'—'}%</div></div>
  `;
 
  // 把 AI 文字裡的區塊標題轉成漂亮格式
  const formatted = aiText
    .replace(/【AI 評分】[\s\S]*?(?=【|$)/, '')
    .replace(/【進場參考區間】[\s\S]*?(?=【|$)/, '')
    .replace(/【(.+?)】/g, '<div class="ai-section"><div class="ai-section-title">// $1</div>')
    .replace(/
 
/g, '</div>
')
    + '</div>';
 
  return `
  <div class="ai-result-card">
    <div class="ai-result-header">
      <div class="ai-stock-info">
        <div class="ai-stock-name">${stock.name}</div>
        <div class="ai-stock-code">${stock.code} · ${stock.exchange}</div>
      </div>
      <div class="ai-price-wrap">
        <div class="ai-price">${sym}${stock.price.toLocaleString()}</div>
        <span class="ai-chg ${chgCls}">${stock.chg>=0?'+':''}${stock.chg}%</span>
      </div>
    </div>
 
    ${score ? `
    <div class="ai-score-row">
      <div class="ai-score-label">AI 綜合評分</div>
      <div class="ai-score-val" style="color:${scoreColor}">${score.toFixed(1)}<span style="font-size:14px;color:var(--muted)"> / 10</span></div>
    </div>` : ''}
 
    <div class="ai-quick-stats">${statsHtml}</div>
    <div class="ai-signals" style="margin-bottom:14px">${sigHtml}</div>
 
    ${entry!=='—'?`<div class="ai-entry">📍 進場參考：${entry}</div>`:''}
 
    <div class="ai-analysis-text">${formatted}</div>
  </div>`;
}
 
async function doAnalyze(){
  if(isAnalyzing) return;
  const input = document.getElementById('search-input');
  let ticker = input.value.trim().toUpperCase();
  if(!ticker) return;
 
  // 台股自動補 .TW
  if(sfMarket==='tw' && /^\d{4,5}$/.test(ticker)) ticker += '.TW';
 
  isAnalyzing = true;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('analyze-btn-text').textContent = '分析中...';
 
  document.getElementById('search-results').innerHTML = `
    <div class="loading-spinner">
      <div class="spinner"></div>
      <div class="spinner-text">// 抓取即時資料中...</div>
    </div>`;
 
  try {
    // Step 1: 抓股票資料
    const stock = await fetchStockData(ticker);
 
    document.getElementById('search-results').innerHTML = `
      <div class="loading-spinner">
        <div class="spinner"></div>
        <div class="spinner-text">// Claude AI 分析中...</div>
      </div>`;
 
    // Step 2: AI 分析
    const aiText = await analyzeWithClaude(stock, sfMarket);
 
    // Step 3: 渲染結果
    document.getElementById('search-results').innerHTML = parseAndRender(stock, aiText, sfMarket);
 
  } catch(e) {
    document.getElementById('search-results').innerHTML = `
      <div class="error-card">
        <p>❌ ${e.message || '查詢失敗，請稍後再試'}</p>
        <p style="margin-top:8px;font-size:12px;color:var(--muted)">
          請確認代號正確<br>台股：直接輸入數字代號（如 2330）<br>美股：輸入英文代號（如 NVDA）
        </p>
      </div>`;
  } finally {
    isAnalyzing = false;
    btn.disabled = false;
    document.getElementById('analyze-btn-text').textContent = '🔍 查詢並分析';
  }
}

════════════════════════════════════ */
function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('sw.js').then(reg=>{
    // check for update on load
    reg.update();
    // listen for daily update message
    navigator.serviceWorker.addEventListener('message', e=>{
      if(e.data?.type === 'DAILY_UPDATE') showToast('✦ 今日選股已更新');
    });
  });
}
 
/* ════════════════════════════════════
   AUTO-REFRESH: once per day
════════════════════════════════════ */
function checkDailyRefresh(){
  const lastDate = localStorage.getItem('last_refresh_date');
  const today = todayStr();
  if(lastDate !== today){
    localStorage.setItem('last_refresh_date', today);
    if(lastDate){ // not first load
      showToast('✦ 今日選股已更新');
      // reload content
      document.getElementById('content').innerHTML = renderMarket(mkt);
    }
  }
}
