<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#12121a" stroke="#c8ff00" stroke-width="6"/>
  <!-- chart bars -->
  <rect x="80" y="300" width="60" height="140" rx="8" fill="#c8ff00" opacity="0.3"/>
  <rect x="160" y="230" width="60" height="210" rx="8" fill="#c8ff00" opacity="0.5"/>
  <rect x="240" y="170" width="60" height="270" rx="8" fill="#c8ff00" opacity="0.7"/>
  <rect x="320" y="110" width="60" height="330" rx="8" fill="#c8ff00"/>
  <!-- trend line -->
  <polyline points="110,310 190,240 270,180 350,120" stroke="#00e5ff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- dot -->
  <circle cx="350" cy="120" r="14" fill="#00e5ff"/>
  <!-- radar label -->
  <text x="256" y="480" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#c8ff00">RADAR</text>
</svg>
